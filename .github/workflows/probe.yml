name: 每週探測新 campaign IDs

on:
  schedule:
    - cron: '0 20 * * 0'   # 每週一台灣時間 04:00（UTC Sunday 20:00）
  workflow_dispatch:

permissions:
  contents: write

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: 安裝 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 安裝依賴
        run: |
          pip install playwright playwright-stealth
          playwright install chromium
          playwright install-deps chromium

      - name: 執行探測
        run: python scraper/probe_campaigns.py

      - name: 提交更新的 campaign 清單
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add scraper/valid_campaigns.txt
          if git diff --cached --quiet; then
            echo "campaign 清單無變更"
          else
            count=$(tr ',' '\n' < scraper/valid_campaigns.txt | wc -l | tr -d ' ')
            git commit -m "probe: 更新有效 campaigns（$count 個）"
            git push
          fi
