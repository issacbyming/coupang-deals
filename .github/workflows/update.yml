name: 更新 Coupang 5折以下商品

on:
  schedule:
    - cron: '0 */6 * * *'   # 每 6 小時（UTC 0:00, 6:00, 12:00, 18:00）
  workflow_dispatch:          # 允許手動觸發

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - name: 安裝 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 安裝依賴
        run: |
          pip install playwright playwright-stealth
          playwright install chromium
          playwright install-deps chromium

      - name: 執行爬蟲
        run: python scraper/run.py

      - name: 產生 HTML
        run: python generate_html.py

      - name: 推送更新
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html seen_urls.json
          if git diff --cached --quiet; then
            echo "沒有變更"
          else
            git commit -m "update: $(date -u +'%Y-%m-%d %H:%M') UTC"
            # 若有人同時推送，先 pull --rebase 再推
            for i in 1 2 3; do
              if git push; then
                exit 0
              fi
              echo "推送被拒，嘗試 rebase 後重試（$i/3）"
              git pull --rebase
            done
            echo "推送失敗（3 次）"
            exit 1
          fi
